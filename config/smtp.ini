# Haraka SMTP Server Configuration
# Place this file at: /etc/haraka/smtp.ini  (production)
# or: ./haraka-config/smtp.ini  (local dev)

[main]
# Listen on all interfaces, port 25 (SMTP)
listen=0.0.0.0:25

# Your domain
me=yourdomain.com

# Max message size: 25MB
max_size=26214400

# Connection limits
nodes=4
max_connections=100

[outbound]
# Outbound delivery
enable_tls=true
