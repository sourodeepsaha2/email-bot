# Haraka DKIM Signing Configuration
# File: config/dkim_sign.ini
#
# DKIM signs all outgoing emails automatically
# This is what makes your emails pass DKIM checks

[main]
# Your selector (can be anything, e.g. "mail", "default", "2024")
selector=mail

# Path to your private key (generated in setup guide)
private_key=/etc/haraka/dkim/yourdomain.com/private

# Domain to sign for
domain=yourdomain.com

# Headers to sign (standard set)
headers=From:To:Cc:Subject:Date:Message-ID:Content-Type

[headers]
# Sign these headers
sign_body=1
